server:
  port: 8084

spring:
  application:
    name: msMecanicos
  datasource:
    url: jdbc:mysql://localhost:3306/ms_mecanicos
    username: root
    password: 
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

springdoc:
  api-docs:
    enabled: true
    version: openapi_3_0
  swagger-ui:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/